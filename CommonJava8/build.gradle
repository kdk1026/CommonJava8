 * This generated file contains a sample Java Library project to get you started.
 * For more details take a look at the Java Libraries chapter in the Gradle
 * user guide available at https://docs.gradle.org/3.5/userguide/java_library_plugin.html
 */

apply plugin: 'java'

group = 'kdk'
version = '0.1'

jar {
    baseName = rootProject.name
    version =  version
}

ext {
	encoding = 'UTF-8'
	javaVersion = '1.8'
	versions = [
		servletVersion: '3.1.0',
		slf4jVersion: '1.7.5',
		logbackVersion: '1.2.3',
		junitVersion: '4.12'
	]
}

sourceCompatibility = javaVersion
targetCompatibility = javaVersion

compileJava.options.encoding = encoding

test {
	ignoreFailures = true
}

repositories {
    jcenter()
}

dependencies {
	compileOnly group: 'javax.servlet', name: 'javax.servlet-api', version: versions.servletVersion

	compile group: 'org.slf4j', name: 'slf4j-api', version: versions.slf4jVersion
	runtime("ch.qos.logback:logback-classic:${versions.logbackVersion}") {
		 exclude group: 'org.slf4j', module: 'slf4j-api'
	}

	testCompile group: 'junit', name: 'junit', version: versions.junitVersion
}

